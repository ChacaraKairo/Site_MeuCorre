services:
  postgres:
    image: postgres:16-alpine
    container_name: korre_postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-korre}
      POSTGRES_USER: ${POSTGRES_USER:-korre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-korre_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - korre_postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  korre_postgres_data:
